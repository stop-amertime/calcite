<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calc(ite)</title>
  <style>
    @font-face {
      font-family: 'DOS';
      src: local('Perfect DOS VGA 437'), local('Fixedsys'), local('Terminal');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DOS', 'Fixedsys', 'Terminal', monospace;
      font-size: 14px;
      background: #008080;
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px;
      cursor: default;
      image-rendering: pixelated;
    }

    /* ── Windows 1.0 / DOS-era beveled box ── */
    .window {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      box-shadow: 1px 1px 0 #000;
      width: 720px;
      max-width: 100%;
      margin-bottom: 4px;
    }

    .title-bar {
      background: #000080;
      color: #fff;
      padding: 2px 4px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .window-body {
      padding: 6px;
    }

    /* ── DOS-era buttons ── */
    .btn {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      font-family: inherit;
      font-size: 12px;
      padding: 3px 12px;
      cursor: pointer;
      color: #000;
      min-width: 70px;
    }

    .btn:active:not(:disabled) {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      padding: 4px 11px 2px 13px;
    }

    .btn:disabled {
      color: #808080;
      text-shadow: 1px 1px 0 #fff;
    }

    .btn:focus {
      outline: 1px dotted #000;
      outline-offset: -4px;
    }

    /* ── Sunken fields ── */
    .field-dark {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #000;
      color: #33ff33;
      font-family: inherit;
      font-size: 14px;
      padding: 8px;
      white-space: pre;
      line-height: 1.15;
      min-height: 200px;
      overflow-y: auto;
      max-height: none;
    }

    /* ── Layout helpers ── */
    .row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .row:last-child { margin-bottom: 0; }

    label { font-size: 12px; }

    .spacer { flex: 1; }

    input[type="number"] { width: 60px; }

    .field {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #fff;
      color: #000;
      font-family: inherit;
      font-size: 12px;
      padding: 2px 4px;
    }

    /* ── Status bar ── */
    .status-bar {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #c0c0c0;
      padding: 2px 4px;
      font-size: 11px;
      margin-top: 4px;
      color: #000;
    }

    /* ── Group box ── */
    .group {
      border: 1px solid #808080;
      padding: 8px 6px 6px;
      margin-bottom: 6px;
      position: relative;
    }

    .group-label {
      position: absolute;
      top: -7px;
      left: 8px;
      background: #c0c0c0;
      padding: 0 4px;
      font-size: 11px;
    }

    hr.groove {
      border: none;
      border-top: 1px solid #808080;
      border-bottom: 1px solid #fff;
      margin: 6px 0;
    }

    input[type="file"] { display: none; }

    /* ── Mode badge ── */
    .mode-badge {
      display: inline-block;
      background: #000080;
      color: #fff;
      padding: 1px 6px;
      font-size: 10px;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <!-- ── Main Window ── -->
  <div class="window">
    <div class="title-bar">
      <span>calc(ite) - CSS Program Runner</span>
    </div>
    <div class="window-body">

      <!-- File + controls -->
      <div class="group">
        <span class="group-label">Program</span>
        <div class="row">
          <label id="file-label" class="btn" style="display:inline-block; text-align:center;">
            Open .css
            <input id="file-input" type="file" accept=".css,.html,.htm">
          </label>
          <div class="spacer"></div>
          <span id="file-name" style="font-size:11px; color:#808080;">No file loaded</span>
          <span id="mode-badge" class="mode-badge" style="display:none;"></span>
        </div>
        <div class="row">
          <button id="btn-start" class="btn" disabled>Run</button>
          <button id="btn-stop" class="btn" disabled>Stop</button>
          <div class="spacer"></div>
          <label>Ticks/batch:</label>
          <input id="batch-size" class="field" type="number" value="100" min="1" max="10000">
        </div>
      </div>

      <hr class="groove">

      <!-- Output area — switches between canvas (graphics), screen text, and string props -->
      <div id="output" class="field-dark"></div>
      <canvas
        id="screen-canvas"
        width="320"
        height="200"
        style="display:none; width: 640px; height: 400px; background:#000; image-rendering: pixelated; border-top: 1px solid #808080; border-left: 1px solid #808080; border-right: 1px solid #fff; border-bottom: 1px solid #fff;"
      ></canvas>

      <!-- Status bar -->
      <div class="status-bar">
        <span id="status">Drop a .css file to begin</span>
        <span style="float:right" id="stats"></span>
      </div>

    </div>
  </div>

  <script>
    const worker = new Worker('calcite-worker.js', { type: 'module' });
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const canvas = document.getElementById('screen-canvas');
    const ctx = canvas.getContext('2d');
    const stats = document.getElementById('stats');
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const batchInput = document.getElementById('batch-size');
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const modeBadge = document.getElementById('mode-badge');

    let running = false;
    let totalTicks = 0;
    let startTime = 0;
    let engineReady = false;
    // Detected video regions: { text: {...}|null, gfx: {...}|null }
    let video = { text: null, gfx: null };
    // Cached ImageData for the gfx canvas, sized on first use.
    let gfxImageData = null;
    // Last known video mode byte from BDA 0x0449. Used to switch display.
    let currentVideoMode = 0x03; // start in text mode

    worker.onmessage = ({ data }) => {
      switch (data.type) {
        case 'ready': {
          engineReady = true;
          btnStart.disabled = false;
          video = data.video || { text: null, gfx: null };

          // Mode badge: "GFX 320x200", "TEXT 80x25", or "GFX+TEXT".
          const labels = [];
          if (video.gfx)  labels.push(`GFX ${video.gfx.width}x${video.gfx.height}`);
          if (video.text) labels.push(`TEXT ${video.text.width}x${video.text.height}`);
          modeBadge.textContent = labels.join(' + ') || 'NO VIDEO';
          modeBadge.style.display = '';

          // Pre-size the canvas if a gfx region is present. Visibility is
          // controlled at runtime by the BDA video mode byte, not bake-time.
          if (video.gfx) {
            canvas.width = video.gfx.width;
            canvas.height = video.gfx.height;
            // Scale up via CSS so 320x200 is viewable on modern monitors.
            canvas.style.width = (video.gfx.width * 2) + 'px';
            canvas.style.height = (video.gfx.height * 2) + 'px';
            gfxImageData = ctx.createImageData(video.gfx.width, video.gfx.height);
          }
          // Start hidden; first tick-result will show the right one.
          canvas.style.display = 'none';
          output.style.display = 'none';

          // Auto-run as soon as the engine is ready. The Run/Stop buttons
          // still work as pause/resume; they just aren't required to see
          // any output in the first place.
          startRunning();
          break;
        }

        case 'tick-result': {
          totalTicks += data.ticks;
          const elapsed = (performance.now() - startTime) / 1000;
          stats.textContent = `${totalTicks.toLocaleString()} ticks | ${(totalTicks / elapsed).toFixed(0)} t/s`;

          // Switch display based on BDA video mode byte (runtime source of truth).
          // A program that switches from text to Mode 13h mid-run is handled
          // correctly because we check every tick, not just at init.
          const isGfxMode = (data.videoMode === 0x13);
          if (isGfxMode !== (currentVideoMode === 0x13)) {
            currentVideoMode = data.videoMode;
            if (isGfxMode) {
              canvas.style.display = '';
              output.style.display = 'none';
            } else {
              canvas.style.display = 'none';
              output.style.display = '';
              output.style.minHeight = '0';
            }
          }
          currentVideoMode = data.videoMode;

          // Graphics: blit RGBA bytes straight to the canvas.
          if (data.gfxBytes && gfxImageData) {
            const src = new Uint8Array(data.gfxBytes);
            gfxImageData.data.set(src);
            ctx.putImageData(gfxImageData, 0, 0);
          }

          // Text mode: write the rendered screen string.
          if (!isGfxMode && data.screen != null) {
            output.textContent = data.screen;
          } else if (!isGfxMode && !video.text && data.stringProperties) {
            // Legacy path: string-property output (only used when neither
            // text nor gfx regions were detected).
            const parts = [];
            for (const [key, value] of Object.entries(data.stringProperties)) {
              if (value) parts.push(value);
            }
            if (parts.length > 0) {
              const text = parts.join('\n');
              const lines = text.split('\n');
              output.textContent = lines.length > 50 ? lines.slice(-50).join('\n') : text;
              output.scrollTop = output.scrollHeight;
            }
          }

          if (running) {
            worker.postMessage({ type: 'tick', count: parseInt(batchInput.value, 10) || 100 });
          }
          break;
        }

        case 'error':
          status.textContent = `Error: ${data.message}`;
          running = false;
          btnStart.disabled = !engineReady;
          btnStop.disabled = true;
          break;
      }
    };

    function startRunning() {
      if (!engineReady || running) return;
      running = true;
      startTime = performance.now();
      totalTicks = 0;
      btnStart.disabled = true;
      btnStop.disabled = false;
      status.textContent = 'Running...';
      worker.postMessage({ type: 'tick', count: parseInt(batchInput.value, 10) || 100 });
    }

    btnStart.addEventListener('click', startRunning);

    btnStop.addEventListener('click', () => {
      running = false;
      btnStart.disabled = false;
      btnStop.disabled = true;
      status.textContent = 'Stopped';
    });

    function extractCssFromHtml(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const styles = doc.querySelectorAll('style');
      return Array.from(styles).map(s => s.textContent).join('\n');
    }

    window.loadCss = loadCss;
    function loadCss(cssText) {
      if (!cssText || cssText.trim().length === 0) {
        status.textContent = 'Loaded file has no CSS content (empty or whitespace only)';
        return;
      }
      running = false;
      engineReady = false;
      video = { text: null, gfx: null };
      gfxImageData = null;
      totalTicks = 0;
      btnStart.disabled = true;
      btnStop.disabled = true;
      output.textContent = '';
      canvas.style.display = 'none';
      stats.textContent = '';
      modeBadge.style.display = 'none';
      status.textContent = `Compiling ${(cssText.length / 1024).toFixed(0)} KB...`;
      worker.postMessage({ type: 'init', css: cssText });
    }

    function readFileAndLoad(file) {
      fileName.textContent = file.name;
      const sizeMb = file.size / 1024 / 1024;
      status.textContent = `Reading ${sizeMb.toFixed(1)} MB…`;
      const reader = new FileReader();
      reader.onload = () => {
        let text = reader.result;
        if (text == null || text.length === 0) {
          status.textContent = `Error: FileReader returned empty for ${file.name} (${sizeMb.toFixed(1)} MB). Files over ~500 MB cannot be loaded via the file picker on most browsers.`;
          return;
        }
        if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
          text = extractCssFromHtml(text);
        }
        loadCss(text);
      };
      reader.onerror = () => {
        status.textContent = `FileReader error: ${reader.error?.message || 'unknown'}`;
      };
      reader.readAsText(file);
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) readFileAndLoad(file);
    });

    // ── Drag and drop ──
    document.body.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });

    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file) readFileAndLoad(file);
    });

    // ── Keyboard input ──
    const dosKeyMap = {
      'ArrowUp': 0x4800,    'ArrowDown': 0x5000,
      'ArrowLeft': 0x4B00,  'ArrowRight': 0x4D00,
      'Escape': 0x011B,     'Enter': 0x1C0D,
      'Backspace': 0x0E08,  'Tab': 0x0F09,
      ' ': 0x3920,
    };

    function keyToCode(e) {
      if (dosKeyMap[e.key]) return dosKeyMap[e.key];
      const c = e.key.length === 1 ? e.key.charCodeAt(0) : 0;
      if (c >= 0x20 && c <= 0x7E) return c;
      return 0;
    }

    document.addEventListener('keydown', (e) => {
      if (!engineReady || !running) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const code = keyToCode(e);
      if (code) {
        worker.postMessage({ type: 'keyboard', key: code });
        e.preventDefault();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (!engineReady) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      worker.postMessage({ type: 'keyboard', key: 0 });
    });

    // Auto-load from ?css=filename URL param
    const cssParam = new URLSearchParams(location.search).get('css');
    if (cssParam) {
      fileName.textContent = cssParam;
      status.textContent = `Fetching ${cssParam}...`;
      fetch(`/output/${cssParam}`)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          status.textContent = `Downloading ${cssParam}...`;
          return r.text();
        })
        .then(css => {
          status.textContent = `Loaded ${(css.length / 1024 / 1024).toFixed(0)} MB`;
          loadCss(css);
        })
        .catch(e => { status.textContent = `Error: ${e.message}`; });
    }
  </script>
</body>
</html>

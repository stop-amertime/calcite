<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calc(ite)</title>
  <style>
    @font-face {
      font-family: 'DOS';
      src: local('Perfect DOS VGA 437'), local('Fixedsys'), local('Terminal');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DOS', 'Fixedsys', 'Terminal', monospace;
      font-size: 14px;
      background: #008080;
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px;
      cursor: default;
      image-rendering: pixelated;
    }

    /* ── Windows 1.0 / DOS-era beveled box ── */
    .window {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      box-shadow: 1px 1px 0 #000;
      width: 720px;
      max-width: 100%;
      margin-bottom: 4px;
    }

    .title-bar {
      background: #000080;
      color: #fff;
      padding: 2px 4px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .window-body {
      padding: 6px;
    }

    /* ── DOS-era buttons ── */
    .btn {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      font-family: inherit;
      font-size: 12px;
      padding: 3px 12px;
      cursor: pointer;
      color: #000;
      min-width: 70px;
    }

    .btn:active:not(:disabled) {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      padding: 4px 11px 2px 13px;
    }

    .btn:disabled {
      color: #808080;
      text-shadow: 1px 1px 0 #fff;
    }

    .btn:focus {
      outline: 1px dotted #000;
      outline-offset: -4px;
    }

    /* ── Sunken fields ── */
    .field-dark {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #000;
      color: #33ff33;
      font-family: inherit;
      font-size: 14px;
      padding: 8px;
      white-space: pre;
      line-height: 1.15;
      min-height: 200px;
      overflow-y: auto;
      max-height: none;
    }

    /* ── Layout helpers ── */
    .row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .row:last-child { margin-bottom: 0; }

    label { font-size: 12px; }

    .spacer { flex: 1; }

    input[type="number"] { width: 60px; }

    .field {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #fff;
      color: #000;
      font-family: inherit;
      font-size: 12px;
      padding: 2px 4px;
    }

    /* ── Status bar ── */
    .status-bar {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #c0c0c0;
      padding: 2px 4px;
      font-size: 11px;
      margin-top: 4px;
      color: #000;
    }

    /* ── Group box ── */
    .group {
      border: 1px solid #808080;
      padding: 8px 6px 6px;
      margin-bottom: 6px;
      position: relative;
    }

    .group-label {
      position: absolute;
      top: -7px;
      left: 8px;
      background: #c0c0c0;
      padding: 0 4px;
      font-size: 11px;
    }

    hr.groove {
      border: none;
      border-top: 1px solid #808080;
      border-bottom: 1px solid #fff;
      margin: 6px 0;
    }

    input[type="file"] { display: none; }

    /* ── Mode badge ── */
    .mode-badge {
      display: inline-block;
      background: #000080;
      color: #fff;
      padding: 1px 6px;
      font-size: 10px;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <!-- ── Main Window ── -->
  <div class="window">
    <div class="title-bar">
      <span>calc(ite) - CSS Program Runner</span>
    </div>
    <div class="window-body">

      <!-- File + controls -->
      <div class="group">
        <span class="group-label">Program</span>
        <div class="row">
          <label id="file-label" class="btn" style="display:inline-block; text-align:center;">
            Open .css
            <input id="file-input" type="file" accept=".css,.html,.htm">
          </label>
          <div class="spacer"></div>
          <span id="file-name" style="font-size:11px; color:#808080;">No file loaded</span>
          <span id="mode-badge" class="mode-badge" style="display:none;"></span>
        </div>
        <div class="row">
          <button id="btn-start" class="btn" disabled>Run</button>
          <button id="btn-stop" class="btn" disabled>Stop</button>
          <div class="spacer"></div>
          <label>Ticks/batch:</label>
          <input id="batch-size" class="field" type="number" value="100" min="1" max="10000">
        </div>
      </div>

      <hr class="groove">

      <!-- Output area — switches between screen and text automatically -->
      <div id="output" class="field-dark"></div>

      <!-- Status bar -->
      <div class="status-bar">
        <span id="status">Drop a .css file to begin</span>
        <span style="float:right" id="stats"></span>
      </div>

    </div>
  </div>

  <script>
    const worker = new Worker('calcite-worker.js', { type: 'module' });
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const stats = document.getElementById('stats');
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const batchInput = document.getElementById('batch-size');
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const modeBadge = document.getElementById('mode-badge');

    let running = false;
    let totalTicks = 0;
    let startTime = 0;
    let engineReady = false;
    let hasVideo = false;

    worker.onmessage = ({ data }) => {
      switch (data.type) {
        case 'ready':
          engineReady = true;
          btnStart.disabled = false;

          if (data.video) {
            hasVideo = true;
            modeBadge.textContent = `VIDEO ${data.video.width}x${data.video.height}`;
            modeBadge.style.display = '';
            output.style.minHeight = '0';
            status.textContent = 'Ready — press Run (keyboard active when running)';
          } else {
            hasVideo = false;
            modeBadge.textContent = 'TEXT';
            modeBadge.style.display = '';
            status.textContent = 'Ready — press Run';
          }
          break;

        case 'tick-result':
          totalTicks += data.ticks;
          const elapsed = (performance.now() - startTime) / 1000;
          stats.textContent = `${totalTicks.toLocaleString()} ticks | ${(totalTicks / elapsed).toFixed(0)} t/s`;

          if (hasVideo && data.screen != null) {
            output.textContent = data.screen;
          } else if (data.stringProperties) {
            const parts = [];
            for (const [key, value] of Object.entries(data.stringProperties)) {
              if (value) parts.push(value);
            }
            if (parts.length > 0) {
              const text = parts.join('\n');
              // Only show the last 50 lines to prevent unbounded growth
              const lines = text.split('\n');
              output.textContent = lines.length > 50 ? lines.slice(-50).join('\n') : text;
              output.scrollTop = output.scrollHeight;
            }
          }

          if (running) {
            worker.postMessage({ type: 'tick', count: parseInt(batchInput.value, 10) || 100 });
          }
          break;

        case 'error':
          status.textContent = `Error: ${data.message}`;
          running = false;
          btnStart.disabled = !engineReady;
          btnStop.disabled = true;
          break;
      }
    };

    btnStart.addEventListener('click', () => {
      running = true;
      startTime = performance.now();
      totalTicks = 0;
      btnStart.disabled = true;
      btnStop.disabled = false;
      status.textContent = 'Running...';
      worker.postMessage({ type: 'tick', count: parseInt(batchInput.value, 10) || 100 });
    });

    btnStop.addEventListener('click', () => {
      running = false;
      btnStart.disabled = false;
      btnStop.disabled = true;
      status.textContent = 'Stopped';
    });

    function extractCssFromHtml(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const styles = doc.querySelectorAll('style');
      return Array.from(styles).map(s => s.textContent).join('\n');
    }

    window.loadCss = loadCss;
    function loadCss(cssText) {
      if (!cssText || cssText.trim().length === 0) {
        status.textContent = 'No CSS found in file';
        return;
      }
      running = false;
      engineReady = false;
      hasVideo = false;
      totalTicks = 0;
      btnStart.disabled = true;
      btnStop.disabled = true;
      output.textContent = '';
      stats.textContent = '';
      modeBadge.style.display = 'none';
      status.textContent = `Compiling ${(cssText.length / 1024).toFixed(0)} KB...`;
      worker.postMessage({ type: 'init', css: cssText });
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      fileName.textContent = file.name;
      const reader = new FileReader();
      reader.onload = () => {
        let text = reader.result;
        if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
          text = extractCssFromHtml(text);
        }
        loadCss(text);
      };
      reader.readAsText(file);
    });

    // ── Drag and drop ──
    document.body.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });

    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (!file) return;
      fileName.textContent = file.name;
      const reader = new FileReader();
      reader.onload = () => {
        let text = reader.result;
        if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
          text = extractCssFromHtml(text);
        }
        loadCss(text);
      };
      reader.readAsText(file);
    });

    // ── Keyboard input ──
    const dosKeyMap = {
      'ArrowUp': 0x4800,    'ArrowDown': 0x5000,
      'ArrowLeft': 0x4B00,  'ArrowRight': 0x4D00,
      'Escape': 0x011B,     'Enter': 0x1C0D,
      'Backspace': 0x0E08,  'Tab': 0x0F09,
      ' ': 0x3920,
    };

    function keyToCode(e) {
      if (dosKeyMap[e.key]) return dosKeyMap[e.key];
      const c = e.key.length === 1 ? e.key.charCodeAt(0) : 0;
      if (c >= 0x20 && c <= 0x7E) return c;
      return 0;
    }

    document.addEventListener('keydown', (e) => {
      if (!engineReady || !running) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const code = keyToCode(e);
      if (code) {
        worker.postMessage({ type: 'keyboard', key: code });
        e.preventDefault();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (!engineReady) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      worker.postMessage({ type: 'keyboard', key: 0 });
    });
  </script>
</body>
</html>
